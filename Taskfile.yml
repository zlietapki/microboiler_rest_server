version: '3'

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the gRPC server
    cmds:
      - go build -o bin/server ./cmd/server

  run:
    desc: Run the gRPC server
    cmds:
      - go run ./cmd/server

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - go fmt ./...
      - go vet ./...

  generate:
    desc: Generate code
    cmds:
      - go generate ./...
